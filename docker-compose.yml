version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ems-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ems-api
    depends_on:
      - db
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION_TIME: ${JWT_ACCESS_EXPIRATION_TIME}
      JWT_REFRESH_EXPIRATION_TIME: ${JWT_REFRESH_EXPIRATION_TIME}
      JWT_INVITATION: ${JWT_INVITATION}
    ports:
      - "8000:8000"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: ems-client
    depends_on:
      - api
    environment:
      VITE_PORT: ${VITE_PORT}
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"

volumes:
  postgres_data: